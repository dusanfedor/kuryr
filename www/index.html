<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuryr - Hlasové Tržiště</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .voice-container { width: 100%; max-width: 400px; text-align: center; margin-bottom: 25px; }
        .mic-button { width: 80px; height: 80px; border-radius: 50%; background: #ff3b30; border: none; color: white; font-size: 2rem; cursor: pointer; }
        #status { font-size: 1.1rem; font-weight: bold; margin: 15px 0; color: #28a745; }
        .vysledky { width: 100%; max-width: 400px; }
        .karta { background: #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid #28a745; display: flex; gap: 15px; align-items: center; cursor: pointer; }
        .img-preview { width: 70px; height: 70px; min-width: 70px; object-fit: contain; border-radius: 8px; background: white; padding: 3px; box-sizing: border-box; }
        
        .detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; z-index: 100; }
        .detail-modal.show { display: flex; }
        .detail-obsah { background: #fff; color: #000; width: 100%; max-width: 400px; border-radius: 16px; padding: 20px; box-sizing: border-box; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.8rem; cursor: pointer; color: #aaa; z-index: 20; }
        
        .input-skupina { position: relative; width: 100%; margin-bottom: 10px; }
        .order-input { width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .mini-mic { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        
        .btn-order { width: 100%; padding: 14px; background: #ffc107; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; color: #000; margin-top: 5px; }
        .galerie-box { position: relative; width: 100%; height: 180px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
        .galerie-img { max-width: 100%; height: 160px; object-fit: contain; }
        
        /* Nový styl pro zobrazení dynamické ceny dopravy */
        .cena-dopravy-box { background: #f4f4f4; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 15px 0 10px 0; text-align: left; font-size: 0.95rem; line-height: 1.4; display: none; }
        .cena-dopravy-hodnota { color: #28a745; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="detailModal" class="detail-modal" onclick="if(event.target.id==='detailModal')this.classList.remove('show')">
        <div class="detail-obsah">
            <span class="close-btn" onclick="document.getElementById('detailModal').classList.remove('show')">&times;</span>
            <div id="modalDynamickyObsah"></div>
        </div>
    </div>

    <div class="voice-container">
        <h2>🎙️ HLASOVÉ TRŽIŠTĚ</h2>
        <p>Mluvte: (např. <i>"sluneční brýle R2"</i>, <i>"dětské brýle"</i>)</p>
        <button class="mic-button" onclick="aktivujMikrofonZbozi()">🎤</button>
        <div id="status">Klikněte pro mluvení</div>
    </div>

    <div class="vysledky" id="vysledky">Načítám...</div>

    <script>
        let nalezenyZoznam = [];
        const status = document.getElementById('status');
        const seznam = document.getElementById('vysledky');

        function ziskejSpeech() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) alert("Hlasové funkce vyžadují Google Chrome nebo Safari.");
            return Speech ? new Speech() : null;
        }

        function aktivujMikrofonZbozi() {
            const rec = ziskejSpeech();
            if (!rec) return;
            rec.lang = 'cs-CZ';
            status.innerText = "🔴 Poslouchám zboží, mluvte...";
            rec.start();
            rec.onresult = async (e) => {
                await provedHledani(e.results[0][0].transcript);
            };
            rec.onerror = () => { status.innerText = "Zkuste to znovu."; };
        }

        function diktujAdresu(id, cenaZbozi) {
            const rec = ziskejSpeech();
            if (!rec) return;
            rec.lang = 'cs-CZ';
            const input = document.getElementById(`msg-${id}`);
            input.placeholder = "🔴 Poslouchám adresu...";
            rec.start();
            rec.onresult = (e) => {
                input.value = e.results[0][0].transcript;
                input.placeholder = "Adresa doručení...";
                aktualizujCenuDopravy(id, cenaZbozi);
            };
        }

        function diktujTelefon(id, cenaZbozi) {
            const rec = ziskejSpeech();
            if (!rec) return;
            rec.lang = 'cs-CZ';
            const input = document.getElementById(`tel-${id}`);
            input.placeholder = "🔴 Poslouchám číslo...";
            rec.start();
            rec.onresult = (e) => {
                input.value = e.results[0][0].transcript.replace(/\s+/g, '');
                input.placeholder = "Telefonní číslo...";
                aktualizujCenuDopravy(id, cenaZbozi);
            };
        }

        // Nová funkce pro kontrolu polí a dynamické zobrazení ceny dopravy
        function aktualizujCenuDopravy(id, cenaZbozi) {
            const adresa = document.getElementById(`msg-${id}`).value.trim();
            const telefon = document.getElementById(`tel-${id}`).value.trim();
            const dbox = document.getElementById(`dopravaBox-${id}`);
            const dval = document.getElementById(`dopravaCena-${id}`);

            // Podmínka: Pokud uživatel vyplnil obě pole, kalkulačka se rozbalí
            if (adresa.length > 0 && telefon.length > 0) {
                const vypoctenaCena = Math.round(90 + (Number(cenaZbozi) * 0.05));
                dval.innerText = vypoctenaCena + " Kč";
                dbox.style.display = "block"; // Zobrazit rámeček s cenou
            } else {
                dbox.style.display = "none";  // Schovat, dokud chybí údaje
            }
        }

      async function provedHledani(vyraz) {
    const stavovyText = document.getElementById('status');
    const hlavniSeznam = document.getElementById('vysledky');
    
    stavovyText.innerText = "Hledám: " + vyraz;
    hlavniSeznam.innerHTML = "<i>Prohledávám databázi...</i>";
    
    try {
        const res = await fetch('/api/hledej?zbozi=' + encodeURIComponent(vyraz));
        nalezenyZoznam = await res.json();
        hlavniSeznam.innerHTML = "";

        // Pokud databáze vrátila prázdné řádky, vypíšeme text
        if (!nalezenyZoznam || nalezenyZoznam.length === 0) {
            hlavniSeznam.innerHTML = "<div id='prazdny-stavy'>Nic nenalezeno pro výraz: " + vyraz + "</div>";
            stavovyText.innerText = "Nalezeno 0 produktů.";
            return;
        }

        // Vykreslení produktů stažených ze Supabase schématu public.produkty
        let vygenerovaneKarty = "";
        nalezenyZoznam.forEach((p, i) => {
            // Použití adresy ze sloupce hlavni_obrazek, případně zástupný symbol
            const foto = p.hlavni_obrazek || "data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='70' height='70' viewBox='0 0 70 70'><rect width='70' height='70' fill='%23333'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-size='10'>Foto</text></svg>";
            
            vygenerovaneKarty += `
                <div class="karta" onclick="zobrazDetail(${i})">
                    <img class="img-preview" src="${foto}" alt="Foto" onerror="this.onerror=null; this.src='https://r2.cz';">
                    <div>
                        <strong style="font-size:0.9rem; display:block; margin-bottom:4px; text-align:left;">${p.nazev_zbozi}</strong>
                        <span style="color:#28a745; font-weight:bold; display:block; text-align:left;">${p.katalogova_cena} Kč</span>
                    </div>
                </div>
            `;
        });
        
        hlavniSeznam.innerHTML = vygenerovaneKarty;
        stavovyText.innerText = "Nalezeno " + nalezenyZoznam.length + " produktů.";
        
    } catch(e) { 
        console.error(e);
        hlavniSeznam.innerHTML = "Chyba API spojení."; 
    }
}

        function zobrazDetail(idx) {
            const p = nalezenyZoznam[idx];
            const cenaZbozi = p.katalogova_cena || 0;
            
            document.getElementById('modalDynamickyObsah').innerHTML = `
                <div class="galerie-box">
                    <img id="modalImg" src="${p.hlavni_obrazek || 'https://placeholders.dev'}" class="galerie-img" onerror="this.src='https://placeholders.dev'">
                </div>

                <h3 style="margin-top:15px; font-size:1.1rem; color:#000; text-align:left;">${p.nazev_zbozi}</h3>
                <p style="color:#28a745; font-weight:bold; font-size:1.2rem; margin:10px 0; text-align:left;">${cenaZbozi} Kč</p>
                <div style="font-size:0.88rem; color:#444; max-height:90px; overflow-y:auto; background:#f4f4f4; padding:10px; border-radius:8px; line-height:1.4; text-align:left; margin-bottom:15px;">
                    <b>Popis:</b><br>${p.popis_zbozi}
                </div>
                
                <!-- Oninput a onblur hlídají zápis klávesnicí a ihned přepočítávají cenu -->
                <div class="input-skupina">
                    <input type="text" id="msg-${p.id_zbozi}" class="order-input" placeholder="Adresa doručení..." oninput="aktualizujCenuDopravy('${p.id_zbozi}', ${cenaZbozi})">
                    <button class="mini-mic" onclick="diktujAdresu('${p.id_zbozi}', ${cenaZbozi})">🎙️</button>
                </div>

                <div class="input-skupina">
                    <input type="tel" id="tel-${p.id_zbozi}" class="order-input" placeholder="Telefonní číslo..." oninput="aktualizujCenuDopravy('${p.id_zbozi}', ${cenaZbozi})">
                    <button class="mini-mic" onclick="diktujTelefon('${p.id_zbozi}', ${cenaZbozi})">🎙️</button>
                </div>
                
                <!-- Interaktivní box s naceněním kurýra -->
                <div id="dopravaBox-${p.id_zbozi}" class="cena-dopravy-box">
                    <b>🚗 Expresní doprava kurýrem:</b><br>
                    Částka za odvoz: <span id="dopravaCena-${p.id_zbozi}" class="cena-dopravy-hodnota">0 Kč</span>
                </div>
                
                <button class="btn-order" onclick="objednat('${p.id_zbozi}')">🚗 Přivolat kurýra</button>
            `;
            document.getElementById('detailModal').classList.add('show');
        }

        async function objednat(id) {
            const adresa = document.getElementById(`msg-${id}`).value.trim();
            const telefon = document.getElementById(`tel-${id}`).value.trim();
            
            if (!adresa) return alert("Zadejte adresu!");
            if (!telefon) return alert("Zadejte telefonní číslo!");
            
            try {
                const res = await fetch('/api/objednat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, adresa, telefon })
                });
                const data = await res.json();
                if (res.ok && data.stav === 'success') {
                    // KLÍČOVÁ ZMĚNA: Žádný alert s cenou, pouze čisté potvrzení a zavření okna
                    alert("🎉 Objednávka byla úspěšně předána dispečinku. Kurýr vyráží!");
                    document.getElementById('detailModal').classList.remove('show');
                } else {
                    alert("Chyba dispečinku.");
                }
            } catch(e) { alert("Chyba spojení."); }
        }


// Automatické načtení modelu z vaší tabulky bezprostředně po startu
window.onload = () => { 
    provedHledani("loop"); 
};


    </script>
</body>
</html>
