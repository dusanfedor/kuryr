<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispečink Kurýra - Aktivní Zakázky</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        h1 { text-align: center; color: #ffc107; font-size: 1.8rem; margin-bottom: 5px; }
        .driver-info { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 25px; }
        .zakazka-karta { background: #2a2a2a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 6px solid #666; display: flex; gap: 15px; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .zakazka-karta.nova { border-left-color: #28a745; }
        .zakazka-karta.v_reseni { border-left-color: #007bff; background: #1e293b; }
        .krabice-ikona { font-size: 2.5rem; background: #333; border-radius: 8px; width: 65px; height: 65px; min-width: 65px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
        .detaily { flex-grow: 1; }
        .nazev { font-size: 0.95rem; font-weight: bold; margin-bottom: 4px; display: block; color: #fff; }
        .cena { color: #28a745; font-size: 1.1rem; font-weight: bold; }
        .trasa-box { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; background: #333; padding: 10px; border-radius: 6px; font-size: 0.9rem; border: 1px solid #444; }
        .bod { display: flex; gap: 8px; align-items: flex-start; }
        .bod-vyzvednout { color: #28a745; font-weight: bold; font-size: 0.85rem; }
        .bod-dorucit { color: #ffc107; font-weight: bold; font-size: 0.85rem; }
        .adresa-text { color: #fff; font-size: 0.95rem; margin-top: 2px; text-align: left; }
        .cas { font-size: 0.75rem; color: #aaa; text-align: right; margin-top: 5px; }
        #prazdny-stavy { text-align: center; color: #888; font-style: italic; margin-top: 20px; }
        .loading { text-align: center; color: #ffc107; font-style: italic; }
        
        .btn-akce { width: 100%; padding: 12px; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 12px; font-size: 1rem; color: white; display: block; text-align: center; text-decoration: none; box-sizing: border-box; }
        .btn-prijmout { background: #28a745; }
        .btn-navigace { background: #ff9500; color: #000; margin-bottom: 8px; }
        .btn-doruceno { background: #007bff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚗 DISPEČINK KURÝRA</h1>
        <div id="driverDisplay" class="driver-info">Identifikátor řidiče: Načítám...</div>
        <div id="seznam-zakazek"><div class="loading">Načítám aktuální zakázky z dispečinku...</div></div>
    </div>

    <script>
        const seznamDiv = document.getElementById('seznam-zakazek');
        
        if (!localStorage.getItem('kuryr_id')) {
            localStorage.setItem('kuryr_id', 'Kuryr_' + Math.floor(Math.random() * 900 + 100));
        }
        const MY_KURYR_ID = localStorage.getItem('kuryr_id');
        document.getElementById('driverDisplay').innerText = `ID vašeho vozu: ${MY_KURYR_ID}`;

        async function nactiZakazky() {
            try {
                const res = await fetch('/api/kuryr/objednavky?kuryr_id=' + MY_KURYR_ID);
                if (!res.ok) return;
                const zakazky = await res.json();
                
                seznamDiv.innerHTML = "";

                if (!zakazky || zakazky.length === 0) {
                    seznamDiv.innerHTML = "<div id='prazdny-stavy'>Aktuálně žádné nákupy nečekají na odvoz. Svět je bez práce!</div>";
                    return;
                }

                let vygenerovaneHtml = "";

                zakazky.forEach(z => {
                    const casFormat = new Date(z.vytvoreno_at).toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
                    const tridaKarty = z.stav === 'v_reseni' ? 'zakazka-karta v_reseni' : 'zakazka-karta nova';
                    const titulek = z.stav === 'v_reseni' ? '🔒 Moje aktivní přeprava' : '🛒 Volná zakázka (Klikni a vydělej)';

                    // STOPROCENTNĚ FUNKČNÍ NEPROUSTŘELNÝ ODPOVEDNÝ SYSTÉM PRO LINK GOOGLE MAP POMOCÍ URLSEARCHPARAMS
                    const pNav = new URLSearchParams();
                    pNav.append("api", "1");
                    pNav.append("origin", z.adresa_vyzvednuti);
                    pNav.append("destination", z.adresa_doruceni);
                    pNav.append("travelmode", "driving");
                    const mapovaNavigaceUrl = "https://google.com?" + pNav.toString();

                    let tlacitkaHtml = "";
                    if (z.stav === 'nova') {
                        tlacitkaHtml = '<button class="btn-akce btn-prijmout" onclick="prijmoutZakazku(' + z.id + ')">⚡ Přijmout zakázku a jet!</button>';
                    } else if (z.stav === 'v_reseni' && z.kuryr_id === MY_KURYR_ID) {
                        tlacitkaHtml = `
                            <a class="btn-akce btn-navigace" href="${mapovaNavigaceUrl}" target="_blank">🗺️ SPUSTIT GPS NAVIGACI (A ➔ B)</a>
                            <button class="btn-akce btn-doruceno" onclick="potvrditDoruceni(${z.id})">✅ Balík předán (Doručeno)</button>
                        `;
                    }

                    vygenerovaneHtml += `
                        <div class="${tridaKarty}">
                            <div class="krabice-ikona">📦</div>
                            <div class="detaily">
                                <span class="nazev">${titulek}</span>
                                <div style="margin-top: 3px; font-size: 1.05rem; font-weight: bold; color: #28a745; text-align: left;">
                                    Odměna: ${z.cena_dopravy} Kč
                                </div>
                                
                                <div class="trasa-box">
                                    <div class="bod">
                                        <span>🟢</span>
                                        <div>
                                            <span class="bod-vyzvednout">A: NAKLÁDKA:</span>
                                            <div class="adresa-text">${z.adresa_vyzvednuti}</div>
                                            <div style="margin-top: 4px; font-size: 0.85rem; text-align: left;">
                                                <a href="tel:${z.telefon_vyzvednuti}" style="color: #aaa; text-decoration: none;">📞 Sklad: ${z.telefon_vyzvednuti}</a>
                                            </div>
                                        </div>
                                    </div>
                                    <div style="border-left: 2px dashed #555; margin-left: 7px; height: 14px; margin-top: 2px; margin-bottom: 2px;"></div>
                                    <div class="bod">
                                        <span>🔴</span>
                                        <div>
                                            <span class="bod-dorucit">B: VYKLÁDKA:</span>
                                            <div class="adresa-text" style="color: #ffc107; font-weight: bold;">${z.adresa_doruceni}</div>
                                            <div style="margin-top: 4px; font-size: 0.88rem; text-align: left;">
                                                <a href="tel:${z.telefon_doruceni}" style="color: #28a745; text-decoration: none; font-weight: bold;">📞 Zákazník: ${z.telefon_doruceni}</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                ${tlacitkaHtml}
                                <div class="cas">Zadáno v ${casFormat}</div>
                            </div>
                        </div>
                    `;
                });

                seznamDiv.innerHTML = vygenerovaneHtml;

            } catch (error) {
                console.error(error);
            }
        }

       async function prijmoutZakazku(id) {
    try {
        const res = await fetch('/api/kuryr/prijmout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ zakazka_id: id, kuryr_id: MY_KURYR_ID })
        });
        const data = await res.json();
        
        if (res.ok) {
            const resAktualni = await fetch('/api/kuryr/objednavky?kuryr_id=' + MY_KURYR_ID);
            const zakazky = await resAktualni.json();
            const mojeZakazka = zakazky.find(z => Number(z.id) === Number(id));

            if (mojeZakazka) {

                    mapaKartaObjekt.searchParams.append("origin", z.adresa_vyzvednuti);
                    mapaKartaObjekt.searchParams.append("destination", z.adresa_doruceni);
                    mapaKartaObjekt.searchParams.append("travelmode", "driving");

            }
            
            nactiZakazky();
        } else {

            nactiZakazky();

        console.error(e);
        alert("Chyba sítě při přebírání zakázky."); 
    }
}


        async function potvrditDoruceni(id) {
            try {
                const res = await fetch('/api/kuryr/doruceno', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zakazka_id: id })
                });
                if (res.ok) {
                    alert("🎉 Skvělá práce! Odměna připsána, zakázka dokončena.");
                    nactiZakazky();
                }
            } catch (e) { alert("Chyba sítě."); }
        }

        window.onload = () => {
            nactiZakazky();
            setInterval(nactiZakazky, 5000);
        };
    </script>
</body>
</html>
